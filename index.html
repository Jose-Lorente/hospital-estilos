<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | Sistema Hospitalario</title>

    <!-- Metadatos básicos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acceso al sistema de gestión hospitalaria">

    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- ================= CABECERA ================= -->
    <header>
        <div>
            <!-- Logo del hospital -->
            <!-- En el futuro será una imagen -->
            <h1>Hospital Central</h1>
            <p>Sistema de Gestión Hospitalaria</p>
        </div>
    </header>

    <!-- ================= CONTENIDO PRINCIPAL ================= -->
    <main>
    <div class="contenedor-formulario">

        <section>
            <h2>Acceso al sistema</h2>
            <p>Introduce tus credenciales para acceder a la plataforma.</p>

            <!-- Formulario de login -->
            <form>

                <div>
                    <label for="usuario">Usuario</label><br>
                    <input 
                        type="text" 
                        id="usuario" 
                        name="usuario" 
                        placeholder="Introduce tu usuario"
                        required
                    >
                </div>

                <br>

                <div>
                    <label for="password">Contraseña</label><br>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Introduce tu contraseña"
                        required
                    >
                </div>

                <br>

                <div>
                    <button type="submit">Entrar al sistema</button>
                </div>

            </form>

            <!-- Información adicional -->
            <p>
                <small>
                    Este sistema es de uso exclusivo para personal autorizado.
                </small>
            </p>
        </section>
    </div>

    </main>

    <!-- ====== PIE DE PÁGINA ======= -->
    <footer>
        <p>
            © 2025 Hospital Central · Proyecto Desarrollo de Interfaces Web
        </p>
    </footer>

</body>
</html>
